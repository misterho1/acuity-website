<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background: ink slate -->
  <rect width="1200" height="630" fill="#1F2A37"/>

  <!-- Subtle accent corner -->
  <rect x="0" y="0" width="6" height="630" fill="#0E3A5F"/>

  <!-- 1px rule, top -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#5A6573" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="80" y="130" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#D8DCE2" letter-spacing="2">
    ACUITY BUSINESS &amp; TAX ADVISORS
  </text>

  <!-- Display headline -->
  <text x="80" y="280" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="400" fill="#F7F8FA" letter-spacing="0.5">
    Tax and accounting for
  </text>
  <text x="80" y="370" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="400" fill="#F7F8FA" letter-spacing="0.5">
    smart business owners.
  </text>

  <!-- Lead -->
  <text x="80" y="450" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#D8DCE2">
    Ogden &middot; South Ogden &middot; St. George &middot; Serving all of Utah
  </text>

  <!-- 1px rule, bottom -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#5A6573" stroke-width="1"/>

  <!-- URL -->
  <text x="80" y="585" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#0E3A5F" letter-spacing="2">
    EXPECTACUITY.COM
  </text>
</svg>
