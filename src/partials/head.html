<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <meta name="description" content="{{description}}" />
  <link rel="canonical" href="{{canonical}}" />

  <!-- Open Graph / Twitter -->
  <meta property="og:site_name" content="Acuity Business & Tax Advisors" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{title}}" />
  <meta property="og:description" content="{{description}}" />
  <meta property="og:url" content="{{canonical}}" />
  <meta property="og:image" content="https://expectacuity.com/assets/og-image.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{title}}" />
  <meta name="twitter:description" content="{{description}}" />
  <meta name="twitter:image" content="https://expectacuity.com/assets/og-image.svg" />

  <!-- Theme + favicon -->
  <meta name="theme-color" content="#0E3A5F" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />

  <!-- Fonts (async, non-render-blocking; display=swap means brief FOUT) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" /></noscript>

  <!-- Styles (parallel-load, no @import chain) -->
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/site.css" />

  <!-- Firm-level structured data (every page) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "AccountingService",
    "name": "Acuity Business & Tax Advisors",
    "legalName": "Acuity Business & Tax Advisors, LLC",
    "url": "https://expectacuity.com/",
    "logo": "https://expectacuity.com/assets/favicon.svg",
    "image": "https://expectacuity.com/assets/og-image.svg",
    "description": "Tax planning, preparation, and accounting for small business owners and individuals across Utah. Three offices in Ogden, South Ogden, and St. George.",
    "areaServed": [
      { "@type": "State", "name": "Utah" },
      { "@type": "City", "name": "Ogden" },
      { "@type": "City", "name": "South Ogden" },
      { "@type": "City", "name": "St. George" },
      { "@type": "City", "name": "Salt Lake City" },
      { "@type": "City", "name": "Park City" }
    ],
    "address": [
      {
        "@type": "PostalAddress",
        "streetAddress": "2655 Kiesel Ave",
        "addressLocality": "Ogden",
        "addressRegion": "UT",
        "postalCode": "84401",
        "addressCountry": "US"
      },
      {
        "@type": "PostalAddress",
        "streetAddress": "920 Chambers Street, Suite 20",
        "addressLocality": "South Ogden",
        "addressRegion": "UT",
        "postalCode": "84403",
        "addressCountry": "US"
      },
      {
        "@type": "PostalAddress",
        "streetAddress": "230 North 1680 East, Suite W",
        "addressLocality": "St. George",
        "addressRegion": "UT",
        "postalCode": "84790",
        "addressCountry": "US"
      }
    ],
    "telephone": ["+1-385-333-4050", "+1-801-393-7884"],
    "email": "justin@expectacuity.com",
    "priceRange": "$$"
  }
  </script>
</head>
<body>
